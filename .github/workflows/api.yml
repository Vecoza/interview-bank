name: API — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "fly.toml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore src/InterviewBank.API/InterviewBank.API.csproj

      - name: Build
        run: dotnet build src/InterviewBank.API/InterviewBank.API.csproj --no-restore -c Release

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
